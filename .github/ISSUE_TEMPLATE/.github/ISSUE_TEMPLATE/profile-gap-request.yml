name: Profile gap request
description: Suggest a missing pattern, missing rule, or a profile gap in jp-ui-contracts.
title: "[profile-gap] "
labels:
  - profile-gap
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form when the current profiles are not expressive enough.
        Good requests are based on a concrete UI context, not on abstract preference alone.

  - type: dropdown
    id: request-type
    attributes:
      label: What kind of gap is this?
      options:
        - Missing rule inside an existing profile
        - Existing profile is too broad
        - Existing profile is too narrow
        - Need a reusable overlay
        - Need a new fixture family
        - Need a new top-level profile
    validations:
      required: true

  - type: dropdown
    id: closest-profile
    attributes:
      label: Which current profile is closest?
      options:
        - base
        - media
        - saas
        - docs
        - dashboard
        - none of the above
    validations:
      required: true

  - type: input
    id: ui-context
    attributes:
      label: UI context
      description: Name the product or surface type, not confidential details.
      placeholder: e.g. help center search results, B2B settings page, analytics table view, article with inline cards
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is missing today?
      description: Explain what the current templates fail to express.
      placeholder: e.g. docs profile does not say enough about mixed prose + code + alert boxes.
    validations:
      required: true

  - type: textarea
    id: desired-shape
    attributes:
      label: What shape should the solution take?
      description: Tell us whether this should be a rule, overlay, fixture, validator rule, or new profile.
      placeholder: e.g. a docs-code overlay, a table-density validator, a mobile-help-center fixture
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Example situations
      description: Provide 1 to 3 realistic examples.
      placeholder: Mention concrete failure cases, repeated review pain, or repeated overrides.
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: What should not be broken?
      description: State the constraints clearly.
      placeholder: e.g. must preserve Japanese paragraph readability, must not over-tighten forms, must stay compatible with docs profile.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I described a real usage context, not just a taste preference.
          required: true
        - label: I explained whether this is a rule, overlay, fixture, validator, or profile problem.
          required: true
